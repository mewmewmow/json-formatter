<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>JSON Tools</title>
<style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,sans-serif;background:#0d1117;color:#c9d1d9;padding:30px 20px}
h1{text-align:center;margin-bottom:20px;color:#58a6ff}.tools{max-width:900px;margin:0 auto}
.btns{display:flex;gap:10px;margin-bottom:15px;flex-wrap:wrap}
.btn{background:#21262d;color:#c9d1d9;border:1px solid #30363d;padding:8px 16px;border-radius:6px;cursor:pointer;font-size:0.9rem}
.btn:hover{background:#30363d}.btn.primary{background:#238636;color:#fff;border-color:#238636}
textarea{width:100%;height:350px;background:#161b22;color:#c9d1d9;border:1px solid #30363d;border-radius:8px;padding:15px;font-family:monospace;font-size:13px;resize:vertical}
.error{color:#f85149;margin-top:10px}.success{color:#3fb950;margin-top:10px}</style></head>
<body><div class="tools"><h1>🔧 JSON Tools</h1><div class="btns">
<button class="btn primary" onclick="fmt()">Format</button><button class="btn" onclick="mini()">Minify</button>
<button class="btn" onclick="valid()">Validate</button><button class="btn" onclick="copy()">Copy</button>
<button class="btn" onclick="clear()">Clear</button></div>
<textarea id="j" placeholder='Paste JSON here...'>{"name":"Bot Army","version":"1.0","bots":12,"active":true}</textarea>
<div id="msg"></div></div>
<script>const $=id=>document.getElementById(id);const m=(t,c)=>{$('msg').innerHTML=`<p class="${c}">${t}</p>`}
function fmt(){try{$('j').value=JSON.stringify(JSON.parse($('j').value),null,2);m('✅ Formatted!','success')}catch(e){m('❌ '+e.message,'error')}}
function mini(){try{$('j').value=JSON.stringify(JSON.parse($('j').value));m('✅ Minified!','success')}catch(e){m('❌ '+e.message,'error')}}
function valid(){try{JSON.parse($('j').value);m('✅ Valid JSON!','success')}catch(e){m('❌ '+e.message,'error')}}
function copy(){navigator.clipboard.writeText($('j').value);m('📋 Copied!','success')}
function clear(){$('j').value='';m('','')}</script></body></html>
